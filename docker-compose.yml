# Run the bot locally with one command:
#
#   1. Copy .env.example to .env and fill in your Aternos details
#   2. docker compose up -d
#   3. Open http://localhost:8080
#
# The bot stays alive in the background. To stop:
#   docker compose down
#
# To rebuild after a code change:
#   docker compose up -d --build

services:
  bot:
    build: .
    image: minecraft-afk-bot:latest
    container_name: minecraft-afk-bot
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      PORT: "8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # Cap memory so a misbehaving prismarine session can't eat the host.
    mem_limit: 512m
    # Use tini-like signal handling provided by docker init.
    init: true
